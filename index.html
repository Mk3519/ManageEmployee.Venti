<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e88e5">
    <title>نظام الحضور والانصراف - تسجيل الدخول</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>نظام إدارة الحضور والانصراف</h1>
                <p>تسجيل الدخول</p>
            </div>

            <!-- رسالة الخطأ -->
            <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
            
            <!-- رسالة النجاح -->
            <div id="successMessage" class="alert alert-success" style="display: none;"></div>

            <!-- نموذج تسجيل الدخول -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="employeeID">رقم الموظف</label>
                    <input 
                        type="text" 
                        id="employeeID" 
                        name="employeeID" 
                        class="form-control" 
                        placeholder="أدخل رقم الموظف"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <div class="password-input-group">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-control" 
                            placeholder="أدخل كلمة المرور"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">دخول</button>
            </form>

            <!-- رسالة التحميل -->
            <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>جاري معالجة طلبك...</p>
            </div>

            <!-- معلومات الجهاز -->
            <div class="device-info">
                <small id="deviceInfo"></small>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/device-fingerprint.js"></script>
    <script src="js/sheets-api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
