<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#5a8fbf">
    <title>Employee Dashboard - Attendance System</title>
    <link rel="icon" href="image/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner-overlay">
            <div class="spinner-container">
                <div class="spinner"></div>
                <p class="loading-text">جاري تحميل البيانات...</p>
            </div>
        </div>

        <!-- الشريط العلوي (Header) -->
        <header class="dashboard-header">
            <div class="header-content">
                <div class="user-info">
                    <svg class="user-icon" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <span id="userName" class="user-name">--</span>
                </div>
                <button id="logoutBtn" class="btn btn-logout">Logout</button>
            </div>
        </header>

        <!-- Main section -->
        <main class="dashboard-main">
            <!-- Alert messages -->
            <div id="alertContainer" class="alert-container"></div>

            <!-- GPS Loading Indicator -->
            <div id="gpsLoadingIndicator" class="gps-loading-indicator">
                <div class="gps-loading-dot"></div>
                <div class="gps-loading-dot"></div>
                <div class="gps-loading-dot"></div>
                <span>جاري التحقق من موقعك...</span>
            </div>

            <!-- Employee info card -->
            <section class="employee-card card-section">
                <h2>Employee Information</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="label">Name:</span>
                        <span class="value" id="empName">--</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Employee ID:</span>
                        <span class="value" id="empID">--</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Position:</span>
                        <span class="value" id="empPosition">--</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Salary:</span>
                        <span class="value" id="empSalary">--</span>
                    </div>
                    <!--<div class="info-item">
                        <span class="label">Phone:</span>
                        <span class="value" id="empPhone">--</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Email:</span>
                        <span class="value" id="empEmail">--</span>
                    </div>-->
                </div>
            </section>

            <!-- Check-in/Check-out section -->
            <section class="attendance-section card-section">
                <h2>Check In / Check Out</h2>
                <div class="attendance-status">
                    <div id="attendanceStatus" class="status-display">
                        <span class="status-badge status-absent">Absent</span>
                    </div>
                    <div class="time-display">
                        <p id="currentTime" class="current-time">--:--:--</p>
                        <p id="currentDate" class="current-date">--/--/----</p>
                    </div>
                </div>

                <div class="attendance-buttons">
                    <button id="checkInBtn" class="btn btn-success btn-lg">
                        <span class="button-icon">✓</span>
                        <span>Check In</span>
                    </button>
                    <button id="checkOutBtn" class="btn btn-warning btn-lg" disabled>
                        <span class="button-icon">✕</span>
                        <span>Check Out</span>
                    </button>
                </div>

                <!-- Last check info -->
                <div class="last-attendance-info">
                    <p>Last Check In: <span id="lastCheckIn">--</span></p>
                    <p>Last Check Out: <span id="lastCheckOut">--</span></p>
                </div>
            </section>

            <!-- Monthly attendance record -->
            <section class="attendance-history card-section">
                <h2>Monthly Attendance Record</h2>
                <div class="table-responsive">
                    <table class="attendance-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Check In Time</th>
                                <th>Check Out Time</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTableBody">
                            <tr>
                                <td colspan="4" class="text-center">No data</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/device-fingerprint.js"></script>
    <script src="js/sheets-api.js"></script>
    <script src="js/employee.js"></script>
</body>
</html>
