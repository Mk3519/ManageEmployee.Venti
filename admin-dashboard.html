<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#c67e7e">
    <title>Admin Dashboard - Attendance System</title>
    <link rel="icon" href="image/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        /* Mobile-Only Styles */
        @media (min-width: 768px) {
            body {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Spinner (مثل صفحة الموظفين) -->
    <div id="loadingSpinner" class="loading-spinner-overlay">
        <div class="spinner-container">
            <div class="spinner"></div>
            <p class="loading-text">جاري تحميل البيانات...</p>
        </div>
    </div>

    <div class="dashboard-container admin-dashboard">
        <!-- الشريط العلوي (Header) -->
        <header class="dashboard-header admin-header">
            <div class="header-content">
                <div class="user-info">
                    <svg class="user-icon" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <span id="adminName" class="user-name">--</span>
                </div>
                <button id="logoutBtn" class="btn btn-logout">Logout</button>
            </div>
        </header>

        <!-- Main section -->
        <main class="dashboard-main">
            <!-- Alert messages -->
            <div id="alertContainer" class="alert-container"></div>

            <!-- Tabs -->
            <div class="tabs-container">
                <div class="tabs-header">

                    <button class="tab-btn" data-tab="daily-attendance">Daily Attendance</button>

                </div>

                <!-- Tab: Daily Attendance -->
                <div id="daily-attendance" class="tab-content">
                    <h2>Daily Attendance Report</h2>
                    <div class="daily-attendance-header">
                        <div class="date-display">
                            <div>
                                <span id="todayDate" class="date-text">Today: --</span>
                            </div>
                            <div style="font-size: 0.875rem; color: #7a8896; margin-top: 5px;">
                                <span id="lastUpdateTime">Last update: --</span>
                            </div>
                        </div>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <button id="refreshAttendanceBtn" class="btn btn-info">🔄 Refresh Now</button>
                            <button id="downloadReportBtn" class="btn btn-success">📥 تقرير يومي</button>
                            <button id="downloadMonthlyBtn" class="btn btn-success">📅 تقرير شهري</button>
                        </div>
                    </div>

                    <!-- Attendance Stats -->
                    <div class="attendance-stats">
                        <div class="stat-card present">
                            <div class="stat-icon">+</div>
                            <div class="stat-content">
                                <div class="stat-label">Present</div>
                                <div class="stat-value" id="presentCount">0</div>
                            </div>
                        </div>
                        <div class="stat-card absent">
                            <div class="stat-icon">-</div>
                            <div class="stat-content">
                                <div class="stat-label">Not Checked In</div>
                                <div class="stat-value" id="absentCount">0</div>
                            </div>
                        </div>
                        <div class="stat-card total">
                            <div class="stat-icon">N</div>
                            <div class="stat-content">
                                <div class="stat-label">Total Employees</div>
                                <div class="stat-value" id="totalCount">0</div>
                            </div>
                        </div>
                    </div>

                    <!-- Filter Tabs -->
                    <div class="attendance-filter-tabs">
                        <button class="filter-tab active" data-filter="all">All</button>
                        <button class="filter-tab" data-filter="present">Present</button>
                        <button class="filter-tab" data-filter="absent">Not Checked In</button>
                    </div>

                    <!-- Attendance Table -->
                    <div class="table-responsive" style="margin-top: 20px;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Check-In</th>
                                    <th>Check-Out</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="dailyAttendanceTableBody">
                                <tr>
                                    <td colspan="5" class="text-center">Loading attendance data...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>



    <!-- Modal for forms (will be added here dynamically) -->
    <div id="modalContainer"></div>

    <!-- Scripts -->
    <!-- SheetJS XLSX Library for Excel Export -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/device-fingerprint.js"></script>
    <script src="js/sheets-api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
