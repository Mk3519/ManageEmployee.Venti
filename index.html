<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#5a8fbf">
    <title>Attendance System - Login</title>
    <link rel="icon" href="image/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner-overlay hidden">
            <div class="spinner-container">
                <div class="spinner"></div>
                <p class="loading-text">جاري تسجيل الدخول...</p>
            </div>
        </div>

        <div class="login-card">
            <div class="login-header">
                <h1>Attendance</h1>
                <p>Login</p>
            </div>

            <!-- Alert messages container -->
            <div id="alertContainer"></div>

            <!-- Login form -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="employeeID">Employee ID</label>
                    <input 
                        type="text" 
                        id="employeeID" 
                        name="employeeID" 
                        class="form-control" 
                        placeholder="Enter employee ID"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-group">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="form-control" 
                            placeholder="Enter password"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <!-- Copyright -->
            <div class="copyright">
                <small>&copy; 2026 Maged Khater . Developer</small>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/device-fingerprint.js"></script>
    <script src="js/sheets-api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
